<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="K·Intel"><meta name="theme-color" content="#060D1A"><title>Konecta Intelligence</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"><style>:root{--bg:#060D1A;--surface:#0B1120;--border:#1E293B;--border-subtle:#0F172A;--text-primary:#F1F5F9;--text-secondary:#CBD5E1;--text-muted:#475569;--text-dim:#334155;--accent-bpo:#00E5C3;--accent-ai:#FF6B35;--accent-impact:#A78BFA}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text-primary);min-height:100vh;overflow-x:hidden}@keyframes spin{to{transform:rotate(360deg)}}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}.topbar{position:sticky;top:0;z-index:100;background:rgba(6,13,26,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border-subtle);padding:14px 20px;display:flex;justify-content:space-between;align-items:center}.dot-live{width:6px;height:6px;background:var(--accent-bpo);border-radius:50%;box-shadow:0 0 8px var(--accent-bpo);animation:pulse 2s ease-in-out infinite}.topbar-left{display:flex;align-items:center;gap:8px}.topbar-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--text-muted);text-transform:uppercase}.topbar-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim)}.hero{padding:36px 20px 28px;border-bottom:1px solid var(--border-subtle)}.hero-eyebrow{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.28em;color:var(--text-dim);text-transform:uppercase;margin-bottom:12px}.hero-title{font-family:'Playfair Display',serif;font-size:clamp(24px,6vw,36px);font-weight:700;line-height:1.15;margin-bottom:14px}.hero-title span{color:var(--accent-bpo)}.hero-desc{color:var(--text-muted);font-size:13px;line-height:1.65;margin-bottom:24px}.btn-all{display:inline-flex;align-items:center;gap:8px;background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:11px 18px;border-radius:2px;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;-webkit-appearance:none}.modules{padding:16px 20px;display:flex;flex-direction:column;gap:2px}.module{border:1px solid var(--border);border-radius:2px;overflow:hidden}.module.open{background:var(--surface)}.module-header{display:flex;align-items:center;justify-content:space-between;padding:18px 16px;cursor:pointer}.module-header-left{display:flex;flex-direction:column;gap:8px;flex:1}.module-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;padding:3px 7px;border-radius:2px;width:fit-content;text-transform:uppercase}.module-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;line-height:1.3}.module-header-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;margin-left:12px}.module-timestamp{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted)}.btn-generate{display:flex;align-items:center;gap:6px;border:none;border-radius:2px;padding:8px 12px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;font-weight:600;cursor:pointer;-webkit-appearance:none;text-transform:uppercase;white-space:nowrap}.module-desc{padding:0 16px 16px;color:var(--text-muted);font-size:12px;line-height:1.6}.module-content{padding:20px 16px 24px;border-top:1px solid var(--border);animation:fadeIn .35s ease}.content-section-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-secondary);margin-top:18px;margin-bottom:8px;border-left:2px solid var(--border);padding-left:8px}.content-section-title:first-child{margin-top:0}.content-bullet{display:flex;gap:8px;margin:6px 0;padding-left:8px}.content-bullet-arrow{color:var(--text-dim);flex-shrink:0;font-size:10px}.content-bullet-text,.content-para{color:var(--text-secondary);font-size:13px;line-height:1.7}.content-para{margin:4px 0}.module-loading{padding:36px 16px;display:flex;flex-direction:column;align-items:center;gap:12px;border-top:1px solid var(--border)}.spinner{width:24px;height:24px;border:2px solid var(--border);border-radius:50%;animation:spin .8s linear infinite}.loading-text{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;color:var(--text-dim);text-transform:uppercase}.module-error{padding:14px 16px;color:#ef4444;font-size:11px;font-family:'DM Mono',monospace;border-top:1px solid var(--border)}.footer{padding:20px;border-top:1px solid var(--border-subtle);display:flex;justify-content:space-between;margin-top:16px}.footer span{font-family:'DM Mono',monospace;font-size:9px;color:var(--border);letter-spacing:.15em;text-transform:uppercase}.api-key-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:10px}.api-key-bar input{flex:1;background:#0F172A;border:1px solid var(--border);color:var(--text-secondary);padding:8px 12px;border-radius:2px;font-family:'DM Mono',monospace;font-size:11px;outline:none}.api-key-bar label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.12em;white-space:nowrap}.api-key-bar button{background:var(--accent-bpo);color:#0B1120;border:none;border-radius:2px;padding:8px 12px;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;cursor:pointer;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}</style></head><body><div class="topbar"><div class="topbar-left"><div class="dot-live"></div><span class="topbar-title">Konecta Cono Sur · CEO Intel</span></div><span class="topbar-date" id="today-date"></span></div><div class="api-key-bar"><label>API Key</label><input type="password" id="api-key-input" placeholder="sk-ant-..." /><button onclick="saveKey()">Guardar</button></div><div class="hero"><div class="hero-eyebrow">Market Intelligence Daily</div><h1 class="hero-title">Radar de<br><span>industria, tech</span><br>y transformación.</h1><p class="hero-desc">Ingresá tu API key de Anthropic una sola vez. Luego generá los tres módulos con un tap.</p><button class="btn-all" onclick="generateAll()"><svg id="icon-all" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>Generar Brief Completo</button></div><div class="modules" id="modules-container"></div><div class="footer"><span>Konecta Cono Sur © 2026</span><span>Claude + Web Search</span></div><script>const MODULES=[{id:'bpo',tag:'MERCADO',tagColor:'#00E5C3',name:'01 — BPO Global & Regional',desc:'Tendencias, movimientos competitivos, M&A y datos del sector BPO mundial y Cono Sur.',prompt:`Eres analista senior para el CEO de Konecta Cono Sur (Argentina, Chile, Uruguay, Paraguay, Bolivia). Busca las noticias MAS RECIENTES del sector BPO mundial y LATAM. Responde en español con esta estructura:\n\n**TITULARES CRÍTICOS**\n(3 bullets de 1 línea)\n\n**TENDENCIA DOMINANTE**\n(1 párrafo 3-4 líneas)\n\n**MOVIMIENTOS COMPETITIVOS**\n(2-3 bullets)\n\n**DATO A RETENER**\n(1 estadística con fuente)\n\n**IMPLICANCIA PARA CONO SUR**\n(1 párrafo corto)`},{id:'ai',tag:'TECNOLOGÍA',tagColor:'#FF6B35',name:'02 — IA & Tecnología',desc:'Desarrollos en IA generativa, automatización y plataformas CX aplicadas a BPO.',prompt:`Eres analista de tecnología para el CEO de Konecta Cono Sur. Busca desarrollos RECIENTES en IA y tech para BPO/CX. Responde en español:\n\n**LANZAMIENTOS Y NOVEDADES IA**\n(3 bullets)\n\n**AUTOMATIZACIÓN Y AGENTES**\n(1 párrafo)\n\n**PLATAFORMAS CX-TECH**\n(2 bullets)\n\n**CASO DE IMPLEMENTACIÓN**\n(1 ejemplo real con resultados)\n\n**ALERTA TECNOLÓGICA**\n(1 desarrollo disruptivo en 12-18 meses)`},{id:'impact',tag:'APLICABILIDAD',tagColor:'#A78BFA',name:'03 — IA Aplicada al Negocio',desc:'Impacto concreto de IA en operaciones, comercial y transformación BPO.',prompt:`Eres consultor de transformación para el CEO de Konecta Cono Sur. Analiza impacto CONCRETO de IA en BPO/CX. Responde en español:\n\n**IMPACTO OPERATIVO INMEDIATO**\n(2-3 bullets)\n\n**IMPACTO COMERCIAL**\n(1 párrafo)\n\n**TRANSFORMACIÓN DEL TALENTO**\n(2 bullets)\n\n**ROI DOCUMENTADO**\n(1-2 ejemplos con números)\n\n**ACCIÓN PRIORITARIA**\n(1 recomendación concreta)`}];const state={};MODULES.forEach(m=>{state[m.id]={loading:false,content:null,timestamp:null,open:false,error:null}});function saveKey(){const k=document.getElementById('api-key-input').value.trim();if(k){localStorage.setItem('anthropic_key',k);document.getElementById('api-key-input').value='••••••••••••••••';alert('API key guardada ✓')}}function getKey(){return localStorage.getItem('anthropic_key')||document.getElementById('api-key-input').value.trim()}function renderModules(){const c=document.getElementById('modules-container');c.innerHTML='';MODULES.forEach(mod=>{const s=state[mod.id];const div=document.createElement('div');div.className='module'+(s.open?' open':'');const bl=s.loading?'Buscando...':s.content?'Actualizar':'Generar Brief';const sp=s.loading?'animation:spin 0.8s linear infinite;':'';const bb=s.content?'background:#1E293B;color:#94A3B8;':`background:${mod.tagColor};color:#0B1120;`;div.innerHTML=`<div class="module-header" onclick="toggleModule('${mod.id}')"><div class="module-header-left"><span class="module-tag" style="color:${mod.tagColor};border:1px solid ${mod.tagColor}33;background:${mod.tagColor}11">${mod.tag}</span><span class="module-name">${mod.name}</span></div><div class="module-header-right">${s.timestamp?`<span class="module-timestamp">${s.timestamp}</span>`:''}<button class="btn-generate" style="${bb}" onclick="event.stopPropagation();fetchModule('${mod.id}')"><svg style="${sp}" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>${bl}</button></div></div>${!s.open?`<div class="module-desc">${mod.desc}</div>`:''}${s.open&&s.loading?`<div class="module-loading"><div class="spinner" style="border-top-color:${mod.tagColor}"></div><span class="loading-text">Consultando fuentes...</span></div>`:''}${s.open&&s.content&&!s.loading?`<div class="module-content">${formatContent(s.content)}</div>`:''}${s.error?`<div class="module-error">⚠ ${s.error}</div>`:''}`;c.appendChild(div)})}function toggleModule(id){if(state[id].content){state[id].open=!state[id].open;renderModules()}}function formatContent(text){if(!text)return'';const lines=text.split('\n');let html='';lines.forEach(line=>{line=line.trim();if(!line){html+='<div style="height:5px"></div>';return}if(/^\*\*[^*]+\*\*$/.test(line)){html+=`<div class="content-section-title">${line.replace(/\*\*/g,'')}</div>`;return}if(line.includes('**')){const cl=line.replace(/\*\*(.*?)\*\*/g,'<strong style="color:#E2E8F0">$1</strong>');html+=line.startsWith('- ')||line.startsWith('• ')?`<div class="content-bullet"><span class="content-bullet-arrow">▸</span><span class="content-bullet-text">${cl.slice(2)}</span></div>`:`<p class="content-para">${cl}</p>`;return}if(line.startsWith('- ')||line.startsWith('• ')||line.startsWith('* ')){html+=`<div class="content-bullet"><span class="content-bullet-arrow">▸</span><span class="content-bullet-text">${line.slice(2)}</span></div>`;return}html+=`<p class="content-para">${line}</p>`});return html}async function fetchModule(id){const key=getKey();if(!key){alert('Primero ingresá tu API key de Anthropic arriba.');return}const mod=MODULES.find(m=>m.id===id);state[id].loading=true;state[id].error=null;state[id].open=true;renderModules();try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-allow-browser':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:mod.prompt}]})});const d=await r.json();if(d.error){throw new Error(d.error.message)}const t=(d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');state[id].content=t||'Sin contenido.';state[id].timestamp=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}catch(e){state[id].error='Error: '+e.message;state[id].open=false}finally{state[id].loading=false;renderModules()}}function generateAll(){MODULES.forEach((m,i)=>setTimeout(()=>fetchModule(m.id),i*300))}const saved=localStorage.getItem('anthropic_key');if(saved){document.getElementById('api-key-input').value='••••••••••••••••'}document.getElementById('today-date').textContent=new Date().toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'});renderModules();</script></body></html>
