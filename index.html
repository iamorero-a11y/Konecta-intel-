size:9px;letter-spacing:.28em;color:var(--text-dim);text-transform:uppercase;margin-bottom:12px}.hero-title{font-family:'Playfair Display',serif;font-size:clamp(24px,6vw,36px);font-weight:700;line-height:1.15;margin-bottom:14px}.hero-title span{color:var(--accent-bpo)}.hero-desc{color:var(--text-muted);font-size:13px;line-height:1.65;margin-bottom:24px}.btn-all{display:inline-flex;align-items:center;gap:8px;background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:11px 18px;border-radius:2px;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;-webkit-appearance:none}.modules{padding:16px 20px;display:flex;flex-direction:column;gap:2px}.module{border:1px solid var(--border);border-radius:2px;overflow:hidden}.module.open{background:var(--surface)}.module-header{display:flex;align-items:center;justify-content:space-between;padding:18px 16px;cursor:pointer}.module-header-left{display:flex;flex-direction:column;gap:8px;flex:1}.module-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;padding:3px 7px;border-radius:2px;width:fit-content;text-transform:uppercase}.module-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;line-height:1.3}.module-header-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;margin-left:12px}.module-timestamp{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted)}.btn-generate{display:flex;align-items:center;gap:6px;border:none;border-radius:2px;padding:8px 12px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;font-weight:600;cursor:pointer;-webkit-appearance:none;text-transform:uppercase;white-space:nowrap}.module-desc{padding:0 16px 16px;color:var(--text-muted);font-size:12px;line-height:1.6}.module-content{padding:20px 16px 24px;border-top:1px solid var(--border);animation:fadeIn .35s ease}.content-section-title{font-family:'DM Mono',monospace;font-size:9px;
